<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Workplace — Vocabulary B1 · B2 · C1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F4F0;--surface:#fff;--surface2:#EDECEA;--border:#D8D6D1;
  --accent:#1A4D8F;--accent-bg:#E8EFF9;--accent-mid:#4A7CC7;--accent-text:#0C3568;
  --ok:#1A6B3C;--ok-bg:#E6F4ED;--ok-border:#A3D4B5;
  --no:#991F1F;--no-bg:#FDECEC;--no-border:#F5AEAE;
  --warn-bg:#FEF3E2;--warn:#7A4A00;
  --text:#1A1917;--text2:#5C5A56;--text3:#9B9896;
  --r:10px;--rl:16px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;}
.view{display:none;max-width:900px;margin:0 auto;padding:1.5rem 1.25rem;}
.view.active{display:block;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:1.5rem;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:2.25rem;width:100%;max-width:460px;}
.login-box h1{font-size:1.25rem;font-weight:600;margin-bottom:4px;letter-spacing:-0.02em;}
.login-box .sub{font-size:0.82rem;color:var(--text2);margin-bottom:1.5rem;}
.field-lbl{font-size:0.75rem;font-weight:500;color:var(--text2);margin-bottom:5px;display:block;}
.login-box input[type=text]{width:100%;padding:9px 13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:0.88rem;outline:none;margin-bottom:10px;}
.login-box input:focus{border-color:var(--accent);}
.level-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.25rem;}
.level-btn{padding:12px 8px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:inherit;font-size:0.82rem;font-weight:500;color:var(--text2);text-align:center;transition:all .15s;position:relative;}
.level-btn:hover:not(.locked-level){background:var(--surface2);}
.level-btn.active{border-color:var(--accent);background:var(--accent-bg);color:var(--accent-text);}
.level-btn.locked-level{opacity:.45;cursor:not-allowed;}
.level-badge{display:block;font-size:1.1rem;font-weight:700;margin-bottom:2px;}
.level-sub{display:block;font-size:0.68rem;color:var(--text3);}
.level-lock{position:absolute;top:6px;right:8px;font-size:11px;}

/* LEVEL COLOUR OVERRIDES */
.lvl-b1{--accent:#1A6B3C;--accent-bg:#E6F4ED;--accent-mid:#3A9E6B;--accent-text:#0F4025;}
.lvl-b2{--accent:#7A4A00;--accent-bg:#FEF3E2;--accent-mid:#BA7517;--accent-text:#5A3300;}
.lvl-c1{--accent:#4C1D95;--accent-bg:#EDE9FE;--accent-mid:#7C3AED;--accent-text:#2E1065;}

/* HDR */
.hdr{color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;border-radius:var(--rl);margin-bottom:1.25rem;}
.hdr.b1{background:#1A6B3C;}.hdr.b2{background:#7A4A00;}.hdr.c1{background:#4C1D95;}
.hdr h1{font-size:1rem;font-weight:600;letter-spacing:-0.01em;}
.hdr .hsub{font-size:0.75rem;opacity:0.75;margin-top:1px;}

/* THEME GRID */
.theme-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:10px;margin-bottom:1rem;}
.theme-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.1rem;cursor:pointer;transition:all .15s;position:relative;}
.theme-card:hover:not(.locked){border-color:var(--accent-mid);background:var(--accent-bg);}
.theme-card.locked{opacity:.5;cursor:not-allowed;}
.t-icon{font-size:1.6rem;margin-bottom:5px;}
.t-name{font-size:0.88rem;font-weight:600;margin-bottom:1px;}
.t-sub{font-size:0.75rem;color:var(--text2);}
.t-prog{margin-top:8px;background:var(--surface2);border-radius:99px;height:4px;overflow:hidden;}
.t-prog-fill{height:4px;border-radius:99px;transition:width .4s;}
.b1 .t-prog-fill,.lvl-b1 .t-prog-fill{background:#1A6B3C;}
.b2 .t-prog-fill,.lvl-b2 .t-prog-fill{background:#7A4A00;}
.c1 .t-prog-fill,.lvl-c1 .t-prog-fill{background:#4C1D95;}
.t-meta{font-size:0.7rem;color:var(--text3);margin-top:4px;}
.lock-icon{position:absolute;top:9px;right:9px;font-size:13px;}
.t-done-badge{position:absolute;top:7px;right:7px;font-size:0.65rem;padding:2px 7px;border-radius:99px;background:var(--ok-bg);color:var(--ok);font-weight:500;}

/* DIFF BADGE */
.diff{display:inline-block;padding:2px 8px;border-radius:99px;font-size:0.7rem;font-weight:500;margin-left:5px;}
.d-b1{background:#E6F4ED;color:#1A6B3C;}.d-b2{background:#FEF3E2;color:#7A4A00;}.d-c1{background:#EDE9FE;color:#4C1D95;}

/* ACT NAV */
.act-nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1.1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:4px;}
.act-btn{flex:1;min-width:60px;padding:5px 5px;border-radius:var(--r);border:none;background:transparent;cursor:pointer;font-size:0.67rem;font-weight:500;color:var(--text2);text-align:center;transition:all .14s;}
.act-btn:hover{background:var(--surface2);}
.act-btn.done-act{background:var(--ok-bg);color:var(--ok);}
.act-btn.active-b1{background:#E6F4ED;color:#1A6B3C;}
.act-btn.active-b2{background:#FEF3E2;color:#7A4A00;}
.act-btn.active-c1{background:#EDE9FE;color:#4C1D95;}
.act-btn .ai{display:block;font-size:0.75rem;margin-bottom:1px;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.2rem;margin-bottom:.9rem;}
.act-title{font-size:0.95rem;font-weight:600;margin-bottom:2px;letter-spacing:-0.01em;}
.act-desc{font-size:0.78rem;color:var(--text2);margin-bottom:.9rem;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:inherit;font-size:0.8rem;font-weight:500;color:var(--text);transition:all .14s;}
.btn:hover{background:var(--surface2);}
.btn-p{color:#fff;border-color:transparent;}
.btn-p.b1-btn{background:#1A6B3C;}.btn-p.b2-btn{background:#7A4A00;}.btn-p.c1-btn{background:#4C1D95;}
.btn-sm{padding:5px 11px;font-size:0.75rem;}
.btn-full{width:100%;justify-content:center;padding:10px;}

/* MISC */
.prog-wrap{background:var(--surface2);border-radius:99px;height:4px;margin-bottom:.9rem;overflow:hidden;}
.prog-fill{height:4px;border-radius:99px;transition:width .3s;}
.b1-fill{background:#1A6B3C;}.b2-fill{background:#7A4A00;}.c1-fill{background:#4C1D95;}
.score-pill{display:inline-block;padding:3px 11px;border-radius:99px;background:var(--surface2);border:1px solid var(--border);font-size:0.75rem;color:var(--text2);font-weight:500;}
.fb-ok{color:var(--ok);background:var(--ok-bg);border-radius:5px;padding:2px 9px;font-size:0.75rem;font-weight:500;}
.fb-no{color:var(--no);background:var(--no-bg);border-radius:5px;padding:2px 9px;font-size:0.75rem;font-weight:500;}
.chip{display:inline-block;padding:2px 8px;border-radius:99px;font-size:0.7rem;font-weight:500;}
.chip-hi{background:var(--ok-bg);color:var(--ok);}
.chip-mid{background:var(--warn-bg);color:var(--warn);}
.chip-lo{background:var(--no-bg);color:var(--no);}

/* FLASHCARD */
.fc-wrap{perspective:800px;height:165px;cursor:pointer;margin-bottom:.75rem;}
.fc-inner{width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d;position:relative;}
.fc-wrap.flipped .fc-inner{transform:rotateY(180deg);}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--rl);border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.1rem;text-align:center;}
.fc-back{transform:rotateY(180deg);}
.fc-b1 .fc-back{background:#E6F4ED;border-color:#A3D4B5;}
.fc-b2 .fc-back{background:#FEF3E2;border-color:#FBBF24;}
.fc-c1 .fc-back{background:#EDE9FE;border-color:#A78BFA;}
.fc-term{font-size:1.1rem;font-weight:600;margin-bottom:5px;}
.fc-def{font-size:0.85rem;color:var(--text2);line-height:1.5;}

/* MATCHING */
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.col-hd{font-size:0.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);text-align:center;margin-bottom:4px;}
.match-item{padding:8px 10px;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;font-size:0.8rem;text-align:center;line-height:1.4;transition:all .13s;min-height:40px;display:flex;align-items:center;justify-content:center;}
.match-item:hover{border-color:var(--accent-mid);background:var(--accent-bg);}
.match-item.selected{border-color:var(--accent);background:var(--accent-bg);color:var(--accent-text);font-weight:500;}
.match-item.matched{border-color:var(--ok-border);background:var(--ok-bg);color:var(--ok);pointer-events:none;font-weight:500;}
.match-item.error{border-color:var(--no-border);background:var(--no-bg);color:var(--no);}

/* EMOJI */
.emoji-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:7px;margin-bottom:.75rem;}
.emoji-card{padding:9px 7px;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;text-align:center;transition:all .13s;background:var(--surface);}
.emoji-card:hover,.emoji-card.selected{border-color:var(--accent-mid);background:var(--accent-bg);}
.emoji-card.matched{border-color:var(--ok-border);background:var(--ok-bg);pointer-events:none;}
.emoji-card.error{border-color:var(--no-border);background:var(--no-bg);}
.emoji-big{font-size:1.6rem;display:block;margin-bottom:3px;}
.emoji-lbl{font-size:0.68rem;color:var(--text3);}
.word-opts{display:flex;flex-wrap:wrap;gap:5px;margin-top:.5rem;}
.word-chip{padding:5px 11px;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;font-size:0.8rem;background:var(--surface);transition:all .13s;}
.word-chip:hover,.word-chip.selected{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent);}
.word-chip.matched{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-border);pointer-events:none;}
.word-chip.error{background:var(--no-bg);color:var(--no);border-color:var(--no-border);}

/* MCQ */
.mc-q{font-size:0.92rem;font-weight:500;margin-bottom:.75rem;line-height:1.5;}
.mc-opt{display:block;width:100%;text-align:left;padding:9px 13px;margin-bottom:6px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:inherit;font-size:0.82rem;color:var(--text);transition:all .13s;}
.mc-opt:hover:not(:disabled){background:var(--surface2);}
.mc-opt.mc-ok{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-border);font-weight:500;}
.mc-opt.mc-no{background:var(--no-bg);color:var(--no);border-color:var(--no-border);}

/* GAP */
.gap-sent{font-size:0.92rem;line-height:2.4;}
.gap-inp{border:none;border-bottom:2px solid var(--accent-mid);background:transparent;padding:1px 5px;font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--text);width:130px;outline:none;}
.gap-hint{font-size:0.7rem;color:var(--text3);margin-top:2px;}

/* SCRAMBLE */
.tile-area{display:flex;flex-wrap:wrap;gap:5px;min-height:38px;border:1.5px dashed var(--border);border-radius:var(--r);padding:5px;margin-bottom:.5rem;background:var(--bg);}
.tile{padding:6px 10px;border-radius:var(--r);font-family:'DM Mono',monospace;font-size:0.92rem;font-weight:600;cursor:pointer;min-width:28px;text-align:center;user-select:none;transition:all .11s;}
.tile-src{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
.tile-src:hover{background:var(--accent-bg);border-color:var(--accent-mid);color:var(--accent-text);}
.tile-src.used{opacity:.2;pointer-events:none;}
.tile-ans{background:var(--accent-bg);border:1px solid var(--accent-mid);color:var(--accent-text);}
.area-lbl{font-size:0.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:3px;}

/* SPELLING */
.spell-clue{font-size:0.9rem;color:var(--text2);margin-bottom:.6rem;line-height:1.55;}
.spell-partial{font-size:1.2rem;font-weight:600;letter-spacing:.18em;font-family:'DM Mono',monospace;color:var(--text);margin:.5rem 0;}
.spell-inp{width:100%;padding:9px 13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Mono',monospace;font-size:0.95rem;outline:none;}
.spell-inp:focus{border-color:var(--accent);}

/* ERROR CORRECTION */
.err-text{font-size:0.9rem;line-height:2.8;color:var(--text);}
.err-inp{border:none;border-bottom:2px solid var(--no);background:transparent;padding:1px 5px;font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--no);width:120px;outline:none;font-style:italic;transition:all .14s;}
.err-inp.fixed{border-bottom-color:var(--ok);color:var(--ok);font-style:normal;}

/* TRANSLATION */
.tr-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start;padding:8px 0;border-bottom:1px solid var(--border);}
.tr-pair:last-child{border-bottom:none;}
.tr-src{font-size:0.88rem;font-weight:500;padding-top:8px;}
.tr-inp{width:100%;padding:7px 11px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:0.82rem;outline:none;}
.tr-inp:focus{border-color:var(--accent);}

/* SENTENCE TRANSFORM (B2/C1) */
.st-q{font-size:0.9rem;margin-bottom:.5rem;line-height:1.6;}
.st-key{font-size:0.8rem;font-weight:600;color:var(--accent-text);background:var(--accent-bg);padding:3px 9px;border-radius:5px;display:inline-block;margin-bottom:.5rem;}
.st-inp{width:100%;padding:8px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:0.88rem;outline:none;font-family:inherit;}
.st-inp:focus{border-color:var(--accent);}

/* BANNER & REPORTS */
.unlock-banner{border-radius:var(--rl);padding:1rem;text-align:center;margin-top:.75rem;}
.b1 .unlock-banner,.ub-b1{background:var(--ok-bg);border:1px solid var(--ok-border);}
.b2 .unlock-banner,.ub-b2{background:#FEF3E2;border:1px solid #FBBF24;}
.c1 .unlock-banner,.ub-c1{background:#EDE9FE;border:1px solid #A78BFA;}
.ub-title{font-size:0.88rem;font-weight:600;margin-bottom:3px;}
.ub-b1 .ub-title{color:var(--ok);}.ub-b2 .ub-title{color:#7A4A00;}.ub-c1 .ub-title{color:#4C1D95;}
.ub-sub{font-size:0.75rem;margin-bottom:.6rem;}
.ub-b1 .ub-sub{color:var(--ok);}.ub-b2 .ub-sub{color:#7A4A00;}.ub-c1 .ub-sub{color:#4C1D95;}
.mini-rep{background:var(--surface2);border-radius:var(--rl);padding:1rem;margin-top:.75rem;}
.mini-rep-title{font-size:0.88rem;font-weight:600;margin-bottom:.6rem;}
.rep-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:0.8rem;}
.rep-row:last-child{border-bottom:none;}
.rep-act-name{flex:0 0 80px;font-weight:500;}
.rep-bar-wrap{flex:1;background:var(--surface);border-radius:99px;height:5px;}
.rep-bar{height:5px;border-radius:99px;}
.b1-bar{background:#1A6B3C;}.b2-bar{background:#7A4A00;}.c1-bar{background:#4C1D95;}
.rep-sc{min-width:42px;text-align:right;font-size:0.75rem;}
.improve-item{font-size:0.75rem;padding:4px 9px;background:var(--no-bg);border-radius:5px;margin-bottom:3px;color:var(--no);line-height:1.4;}
.rec-item{font-size:0.75rem;padding:4px 9px;background:var(--accent-bg);border-radius:5px;margin-bottom:3px;color:var(--accent-text);line-height:1.4;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:8px;margin-bottom:1rem;}
.stat-card{background:var(--surface2);border-radius:var(--r);padding:.75rem;}
.stat-lbl{font-size:0.68rem;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.stat-val{font-size:1.4rem;font-weight:600;color:var(--text);}
.stat-sub{font-size:0.7rem;color:var(--text3);margin-top:2px;}
.theme-rep-block{padding:.75rem 0;border-bottom:1px solid var(--border);}
.theme-rep-block:last-child{border-bottom:none;}
.act-mini-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:0.75rem;}
.act-mini-name{flex:0 0 72px;color:var(--text2);}
.act-mini-bar-wrap{flex:1;background:var(--surface2);border-radius:99px;height:4px;}
.act-mini-bar{height:4px;border-radius:99px;}
.act-mini-sc{min-width:36px;text-align:right;color:var(--text2);}
.section-title{font-size:0.88rem;font-weight:600;margin-bottom:.5rem;margin-top:.75rem;}
.level-unlock-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.5rem;text-align:center;margin-top:1rem;}

@media(max-width:560px){
  .match-cols,.tr-pair{grid-template-columns:1fr;}
  .act-btn{min-width:50px;font-size:0.6rem;}
  .level-row{grid-template-columns:1fr;}
}
@media print{.btn,.act-nav,.hdr .btn{display:none!important;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="view-login" class="view active" style="max-width:100%;padding:0;">
  <div class="login-wrap">
    <div class="login-box">
      <div style="width:42px;height:42px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:1.1rem;font-size:1.3rem;">🏢</div>
      <h1>The Workplace — Vocabulary</h1>
      <p class="sub">CEFR adaptive · B1 · B2 · C1 · 4 themes · 9 activities per level</p>
      <label class="field-lbl">Full name</label>
      <input type="text" id="login-name" placeholder="e.g. Marie Dupont" autocomplete="name">
      <label class="field-lbl">Class / group (optional)</label>
      <input type="text" id="login-class" placeholder="e.g. L3 Anglais — Group A" style="margin-bottom:1.1rem;">
      <label class="field-lbl">Select your level</label>
      <div class="level-row" id="level-row">
        <div class="level-btn active" id="lvl-b1" onclick="selectLevel('b1')">
          <span class="level-badge">B1</span>
          <span class="level-sub">Intermediate</span>
        </div>
        <div class="level-btn locked-level" id="lvl-b2" onclick="selectLevel('b2')">
          <span class="level-badge">B2</span>
          <span class="level-sub">Upper-intermediate</span>
          <span class="level-lock" id="b2-lock">🔒</span>
        </div>
        <div class="level-btn locked-level" id="lvl-c1" onclick="selectLevel('c1')">
          <span class="level-badge">C1</span>
          <span class="level-sub">Advanced</span>
          <span class="level-lock" id="c1-lock">🔒</span>
        </div>
      </div>
      <button class="btn btn-p b1-btn btn-full" id="start-btn" onclick="doLogin()">Start B1 →</button>
      <p id="login-err" style="font-size:0.75rem;color:var(--no);margin-top:7px;min-height:14px;"></p>
    </div>
  </div>
</div>

<!-- THEMES -->
<div id="view-themes" class="view">
  <div class="hdr" id="themes-hdr">
    <div><h1 id="hdr-name"></h1><p class="hsub" id="hdr-sub"></p></div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;">
      <button class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:#fff;border-color:rgba(255,255,255,0.3);" id="final-btn" onclick="showFinalReport()" style="display:none;">My report</button>
      <button class="btn btn-sm" style="background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.2);" onclick="showView('login')">← Levels</button>
    </div>
  </div>
  <div class="theme-grid" id="theme-grid"></div>
  <p style="font-size:0.75rem;color:var(--text3);text-align:center;" id="theme-hint"></p>
</div>

<!-- ACTIVITIES -->

const THEME_IDS=['jobs','hr','pay','events'];

// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════
let userName='',userClass='';
let selectedLevel='b1';
let unlockedLevels=['b1','b2','c1'];
let levelProgress={b1:{jobs:{},hr:{},pay:{},events:{}},b2:{jobs:{},hr:{},pay:{},events:{}},c1:{jobs:{},hr:{},pay:{},events:{}}};
let levelScores={b1:{jobs:{},hr:{},pay:{},events:{}},b2:{jobs:{},hr:{},pay:{},events:{}},c1:{jobs:{},hr:{},pay:{},events:{}}};
let levelWrong={b1:{jobs:[],hr:[],pay:[],events:[]},b2:{jobs:[],hr:[],pay:[],events:[]},c1:{jobs:[],hr:[],pay:[],events:[]}};
let unlockedThemes={b1:['jobs','hr','pay','events'],b2:['jobs','hr','pay','events'],c1:['jobs','hr','pay','events']};
let currentTheme=null,currentAct=null;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pct(s,t){return t?Math.round(s/t*100):0;}
function chipCls(p){return p>=70?'chip-hi':p>=40?'chip-mid':'chip-lo';}
function lm(){return LEVEL_META[selectedLevel];}
function addWrong(item){if(!levelWrong[selectedLevel][currentTheme].includes(item))levelWrong[selectedLevel][currentTheme].push(item);}
function themeData(){return DATA[currentTheme][selectedLevel];}

function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+id).classList.add('active');}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function selectLevel(lvl){
  if(!unlockedLevels.includes(lvl))return;
  selectedLevel=lvl;
  document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('lvl-'+lvl).classList.add('active');
  document.getElementById('start-btn').className='btn btn-p '+lm().btnCls+' btn-full';
  document.getElementById('start-btn').textContent='Start '+lvl.toUpperCase()+' →';
}
function updateLevelButtons(){
  ['b1','b2','c1'].forEach(lvl=>{
    const btn=document.getElementById('lvl-'+lvl);
    const lock=document.getElementById(lvl+'-lock');
    if(unlockedLevels.includes(lvl)){btn.classList.remove('locked-level');if(lock)lock.style.display='none';}
    else{btn.classList.add('locked-level');if(lock)lock.style.display='block';}
  });
}
function doLogin(){
  const n=document.getElementById('login-name').value.trim();
  if(!n){document.getElementById('login-err').textContent='Please enter your name.';return;}
  userName=n;userClass=document.getElementById('login-class').value.trim();
  showThemes();
}
document.getElementById('login-name').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// ── THEMES ────────────────────────────────────────────────────────────────────
function showThemes(){
  showView('themes');
  const m=lm();
  document.getElementById('hdr-name').textContent=userName+(userClass?' · '+userClass:'');
  document.getElementById('hdr-sub').textContent=selectedLevel.toUpperCase()+' — '+m.name+' · The Workplace Vocabulary';
  document.getElementById('themes-hdr').className='hdr '+m.hdrCls;
  document.getElementById('theme-hint').textContent='Select any theme to begin. You can switch levels at any time using the ← Levels button.';
  const done=THEME_IDS.every(tid=>ACT_TYPES.every(a=>levelProgress[selectedLevel][tid][a]));
  document.getElementById('final-btn').style.display=done?'inline-flex':'none';
  renderThemeGrid();
}
function renderThemeGrid(){
  const g=document.getElementById('theme-grid');g.innerHTML='';
  const ut=unlockedThemes[selectedLevel]||['jobs'];
  THEME_IDS.forEach(tid=>{
    const locked=!ut.includes(tid);
    const done=ACT_TYPES.filter(a=>levelProgress[selectedLevel][tid][a]).length;
    const complete=done===ACT_TYPES.length;
    const th=DATA[tid];
    const el=document.createElement('div');el.className='theme-card'+(locked?' locked':'');
    el.innerHTML=`<div class="t-icon">${th.icon}</div><p class="t-name">${th.name}</p><p class="t-sub">${th.sub}</p><span class="diff ${lm().diffCls}">${selectedLevel.toUpperCase()}</span><div class="t-prog" style="margin-top:8px;"><div class="t-prog-fill ${lm().fillCls}" style="width:${done/ACT_TYPES.length*100}%"></div></div><p class="t-meta">${done}/${ACT_TYPES.length} activities</p>${locked?'<span class="lock-icon">🔒</span>':''}${complete&&!locked?'<span class="t-done-badge">✓ Complete</span>':''}`;
    if(!locked)el.onclick=()=>openTheme(tid);
    g.appendChild(el);
  });
}
function openTheme(tid){
  currentTheme=tid;
  const th=DATA[tid];const m=lm();
  document.getElementById('acts-title').textContent=th.icon+' '+th.name+' — '+th.sub;
  document.getElementById('acts-sub').textContent=selectedLevel.toUpperCase()+' · '+m.name+' · '+ACT_TYPES.filter(a=>levelProgress[selectedLevel][tid][a]).length+'/'+ACT_TYPES.length+' done';
  document.getElementById('acts-hdr').className='hdr '+m.hdrCls;
  buildActNav();showView('acts');openAct('flashcards');
}
function buildActNav(){
  const nav=document.getElementById('act-nav');nav.innerHTML='';
  ACT_TYPES.forEach(a=>{
    const btn=document.createElement('button');
    btn.className='act-btn'+(levelProgress[selectedLevel][currentTheme][a]?' done-act':'');
    btn.id='abt-'+a;btn.innerHTML=`<span class="ai">${ACT_ICONS[a]}</span>${ACT_LABELS[a]}`;
    btn.onclick=()=>openAct(a);nav.appendChild(btn);
  });
}
function openAct(type){
  currentAct=type;
  document.querySelectorAll('.act-btn').forEach(b=>{b.classList.remove('active-b1','active-b2','active-c1');});
  const btn=document.getElementById('abt-'+type);if(btn)btn.classList.add(lm().activeCls);
  document.getElementById('act-panels').innerHTML='';
  const c=document.getElementById('act-panels');
  const td=themeData();
  if(type==='flashcards')buildFC(td,c);
  else if(type==='match-ef')buildMEF(td,c);
  else if(type==='emoji')buildEmoji(td,c);
  else if(type==='mcq')buildMCQ(td,c);
  else if(type==='gapfill')buildGap(td,c);
  else if(type==='scramble')buildScramble(td,c);
  else if(type==='spelling')buildSpelling(td,c);
  else if(type==='errors')buildErrors(td,c);
  else if(type==='translation')buildTR(td,c);
}
function markDone(act,sc,total){
  levelProgress[selectedLevel][currentTheme][act]=true;
  levelScores[selectedLevel][currentTheme][act]={score:sc,total};
  const btn=document.getElementById('abt-'+act);
  if(btn){btn.classList.add('done-act');btn.classList.remove('active-b1','active-b2','active-c1');}
  // unlock next theme
  const tidx=THEME_IDS.indexOf(currentTheme);
  const ut=unlockedThemes[selectedLevel];
  if(ACT_TYPES.every(a=>levelProgress[selectedLevel][currentTheme][a])&&tidx<THEME_IDS.length-1){
    const nxt=THEME_IDS[tidx+1];if(!ut.includes(nxt))ut.push(nxt);
  }
  // unlock next level
  if(THEME_IDS.every(tid=>ACT_TYPES.every(a=>levelProgress[selectedLevel][tid][a]))){
    if(selectedLevel==='b1'&&!unlockedLevels.includes('b2')){unlockedLevels.push('b2');unlockedThemes.b2=['jobs'];updateLevelButtons();}
    if(selectedLevel==='b2'&&!unlockedLevels.includes('c1')){unlockedLevels.push('c1');unlockedThemes.c1=['jobs'];updateLevelButtons();}
  }
  const sub=document.getElementById('acts-sub');
  if(sub)sub.textContent=selectedLevel.toUpperCase()+' · '+lm().name+' · '+ACT_TYPES.filter(a=>levelProgress[selectedLevel][currentTheme][a]).length+'/'+ACT_TYPES.length+' done';
  renderThemeGrid();
}
function completeBanner(container,title,msg,btnLabel,action){
  container.querySelectorAll('.unlock-banner,.mini-rep').forEach(x=>x.remove());
  const mr=buildMiniRep();container.appendChild(mr);
  const b=document.createElement('div');b.className='unlock-banner '+lm().ubCls;
  b.innerHTML=`<p class="ub-title">✓ ${title}</p><p class="ub-sub">${msg}</p>`;
  const cbtn=document.createElement('button');cbtn.className='btn btn-sm';cbtn.textContent=btnLabel;cbtn.onclick=action;
  b.appendChild(cbtn);container.appendChild(b);
}
function buildMiniRep(){
  const sc=levelScores[selectedLevel][currentTheme];
  const div=document.createElement('div');div.className='mini-rep';
  let html=`<p class="mini-rep-title">${DATA[currentTheme].icon} ${DATA[currentTheme].name} — ${selectedLevel.toUpperCase()} summary</p>`;
  ACT_TYPES.forEach(a=>{if(sc[a]&&sc[a].total>0){const p=pct(sc[a].score,sc[a].total);html+=`<div class="rep-row"><span class="rep-act-name">${ACT_LABELS[a]}</span><div class="rep-bar-wrap"><div class="rep-bar ${lm().barCls}" style="width:${p}%"></div></div><span class="rep-sc">${sc[a].score}/${sc[a].total}</span><span class="chip ${chipCls(p)}" style="margin-left:4px;">${p}%</span></div>`;}});
  const ww=levelWrong[selectedLevel][currentTheme];
  if(ww.length){html+=`<p class="section-title" style="margin-top:.6rem;">Areas to review:</p>`;ww.slice(0,5).forEach(w=>{html+=`<div class="improve-item">⚠ ${w}</div>`;});}
  div.innerHTML=html;return div;
}

// MATCH EF
function buildMEF(td,c){
  let score=0,sel=null;const pairs=shuffle(td.vocab).slice(0,8);
  const div=document.createElement('div');div.className='card';
  div.innerHTML=`<p class="act-title">Match English ↔ French ${diffBadge()}</p><p class="act-desc">Select a term on the left, then its equivalent on the right. Match all 8 pairs to complete.</p><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:5px;"><span class="score-pill" id="mef-s">0 / 8 matched</span><button class="btn btn-sm" id="mef-rb">New round</button></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:5px;"><p class="col-hd">English</p><p class="col-hd">Français</p></div><div class="match-cols" id="mef-grid"></div><p id="mef-r" style="font-size:.8rem;color:var(--text2);margin-top:.4rem;min-height:16px;"></p>`;
  c.appendChild(div);
  function build(){score=0;sel=null;document.getElementById('mef-s').textContent='0 / 8 matched';document.getElementById('mef-r').textContent='';const terms=shuffle(pairs.map(p=>({text:p.en,type:'en',id:p.en})));const defs=shuffle(pairs.map(p=>({text:p.fr,type:'fr',id:p.en})));const grid=document.getElementById('mef-grid');grid.innerHTML='';for(let i=0;i<pairs.length;i++){[terms[i],defs[i]].forEach(item=>{const el=document.createElement('div');el.className='match-item';el.textContent=item.text;el.dataset.id=item.id;el.dataset.type=item.type;el.onclick=()=>onM(el);grid.appendChild(el);});}}
  function onM(el){if(el.classList.contains('matched'))return;if(!sel){sel=el;el.classList.add('selected');}else{if(el===sel){el.classList.remove('selected');sel=null;return;}if(el.dataset.type===sel.dataset.type){sel.classList.remove('selected');sel=null;el.classList.add('selected');sel=el;return;}if(el.dataset.id===sel.dataset.id){el.classList.add('matched');sel.classList.remove('selected');sel.classList.add('matched');score++;sel=null;document.getElementById('mef-s').textContent=score+' / 8 matched';if(score===8){document.getElementById('mef-r').textContent='All matched!';markDone('match-ef',8,8);completeBanner(c,'Matching complete!','Next: Image matching','→ Image',()=>openAct('emoji'));}}else{addWrong('Matching: '+el.dataset.id);el.classList.add('error');sel.classList.add('error');const p=sel;setTimeout(()=>{el.classList.remove('error','selected');p.classList.remove('error','selected');sel=null;},700);}}}
  document.getElementById('mef-rb').onclick=build;build();
}

function buildScramble(td,c){
  let idx=0,sc=0,ans=[],used=[];const words=shuffle([...td.scramble]);
  const div=document.createElement('div');div.className='card';
  div.innerHTML=`<p class="act-title">Word scramble ${diffBadge()}</p><p class="act-desc">Tap the letters to reconstruct the correct vocabulary term from the contextual clue provided.</p><div class="prog-wrap"><div class="prog-fill ${fillCls()}" id="sc-p" style="width:5%"></div></div><p style="font-size:.7rem;color:var(--text3);margin-bottom:3px;" id="sc-m"></p><p style="font-size:.88rem;color:var(--text2);margin-bottom:.75rem;line-height:1.5;" id="sc-cl"></p><p class="area-lbl">Your answer</p><div class="tile-area" id="sc-an"></div><p class="area-lbl">Available letters</p><div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.6rem;" id="sc-sr"></div><p id="sc-fb" style="font-size:.82rem;min-height:16px;margin-top:4px;"></p>`;
  c.appendChild(div);
  const br=document.createElement('div');br.style.cssText='display:flex;gap:7px;align-items:center;flex-wrap:wrap;';br.innerHTML=`<button class="btn btn-sm" onclick="scClr()">Clear</button><button class="${btnPCls()}" onclick="scChk()">Check</button><button class="btn btn-sm" id="sc-nx" onclick="scNx()" style="display:none;">Next →</button><span class="score-pill" id="sc-sc" style="margin-left:auto;"></span>`;c.appendChild(br);
  function render(){document.getElementById('sc-fb').textContent='';document.getElementById('sc-nx').style.display='none';if(idx>=words.length){div.innerHTML=`<div style="text-align:center;padding:1.5rem .5rem;"><p style="font-size:2.2rem;font-weight:600;margin-bottom:.4rem;">${sc}/${words.length}</p></div>`;markDone('scramble',sc,words.length);completeBanner(c,'Scramble complete!','Next: Spelling','→ Spelling',()=>openAct('spelling'));br.style.display='none';return;}const w=words[idx];document.getElementById('sc-m').textContent='Word '+(idx+1)+' of '+words.length;document.getElementById('sc-cl').textContent='Clue: '+w.c;document.getElementById('sc-p').style.width=((idx+1)/words.length*100)+'%';ans=[];used=Array(w.w.length).fill(false);rT(shuffle(w.w.split('')));rA();}
  function rT(letters){const sr=document.getElementById('sc-sr');sr.innerHTML='';letters.forEach((l,i)=>{const t=document.createElement('div');t.className='tile tile-src';t.textContent=l;t.dataset.i=i;t.onclick=()=>{if(used[i])return;used[i]=true;t.classList.add('used');ans.push({l,i});rA();};sr.appendChild(t);});}
  function rA(){const an=document.getElementById('sc-an');an.innerHTML='';ans.forEach((x,pos)=>{const t=document.createElement('div');t.className='tile tile-ans';t.textContent=x.l;t.onclick=()=>{document.querySelectorAll('#sc-sr .tile').forEach(tile=>{if(parseInt(tile.dataset.i)===x.i){tile.classList.remove('used');used[x.i]=false;}});ans.splice(pos,1);rA();};an.appendChild(t);});}
  window.scClr=()=>{used=Array(words[idx].w.length).fill(false);document.querySelectorAll('#sc-sr .tile').forEach(t=>t.classList.remove('used'));ans=[];rA();document.getElementById('sc-fb').textContent='';};
  window.scChk=()=>{const attempt=ans.map(x=>x.l).join('');const correct=words[idx].w;if(attempt===correct){sc++;document.getElementById('sc-fb').innerHTML='<span class="fb-ok">Correct! '+correct+'</span>';}else{document.getElementById('sc-fb').innerHTML='<span class="fb-no">Not quite.</span> Answer: <strong>'+correct+'</strong>';addWrong('Scramble: '+correct);}document.getElementById('sc-sc').textContent=sc+' correct';document.getElementById('sc-nx').style.display='inline-flex';};
  window.scNx=()=>{idx++;render();};render();
}

  c.appendChild(div);
  window.rstEC=()=>{et.errors.forEach((e,i)=>{const inp=document.getElementById('ec-'+i);if(inp){inp.value=e.wrong;inp.classList.remove('fixed');}});document.getElementById('ec-sc').textContent='0 / '+et.errors.length;document.getElementById('ec-fb').innerHTML='';checked=false;};
  window.chkEC=()=>{let sc=0;const fb=[];et.errors.forEach((e,i)=>{const inp=document.getElementById('ec-'+i);if(!inp)return;const v=(inp.value||'').trim().toLowerCase();const ok=v===e.correct.toLowerCase();if(ok){sc++;inp.classList.add('fixed');}else{inp.classList.remove('fixed');fb.push('"'+e.wrong+'" → <strong>'+e.correct+'</strong>');addWrong('Error: "'+e.wrong+'" → "'+e.correct+'"');}});document.getElementById('ec-sc').textContent=sc+' / '+et.errors.length;const fbd=document.getElementById('ec-fb');if(fb.length){fbd.innerHTML='<p style="font-size:.78rem;font-weight:600;color:var(--no);margin-bottom:3px;">Still to correct:</p>'+fb.map(f=>`<div class="improve-item">${f}</div>`).join('');}else{fbd.innerHTML='<p style="font-size:.82rem;font-weight:600;color:var(--ok);">All errors corrected!</p>';}if(sc===et.errors.length&&!checked){checked=true;markDone('errors',sc,et.errors.length);completeBanner(c,'Error correction complete!','Final activity: Translation','→ Translation',()=>openAct('translation'));}};
}

// TRANSLATION
function buildTR(td,c){
  const tr=td.tr;const items=shuffle([...tr.pairs]);
  const div=document.createElement('div');div.className='card';
  div.innerHTML=`<p class="act-title">Translation ${diffBadge()}</p><p class="act-desc">Translate each ${tr.srcLbl.toLowerCase()} term into ${tr.tgtLbl.toLowerCase()}. At B2 and C1, direction is reversed (English → French) to consolidate productive vocabulary knowledge.</p><div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:.9rem;"><span class="score-pill" id="tr-sc">0 / ${items.length}</span><button class="${btnPCls()}" onclick="chkTR()">Check answers</button><button class="btn btn-sm" onclick="rstTR()">Reset</button></div><div id="tr-list"></div>`;
  c.appendChild(div);
  function build(){document.getElementById('tr-sc').textContent='0 / '+items.length;const list=document.getElementById('tr-list');list.innerHTML='';items.forEach((item,i)=>{const row=document.createElement('div');row.className='tr-pair';row.innerHTML=`<p class="tr-src">${item.src}</p><div><input class="tr-inp" id="tri-${i}" placeholder="${tr.tgtLbl} translation..." autocomplete="off"><p id="trf-${i}" style="font-size:.75rem;margin-top:3px;min-height:14px;"></p></div>`;list.appendChild(row);});}
  window.rstTR=build;
  window.chkTR=()=>{let sc=0;items.forEach((item,i)=>{const v=(document.getElementById('tri-'+i).value||'').trim().toLowerCase();const tgt=item.tgt.toLowerCase();const ok=v===tgt||v===tgt.replace(/[()\/]/g,'').trim()||v===tgt.split('/')[0].trim();document.getElementById('trf-'+i).innerHTML=ok?'<span class="fb-ok">Correct!</span>':'<span class="fb-no">'+item.tgt+'</span>';if(ok)sc++;else addWrong('Translation: '+item.src+' → '+item.tgt);});document.getElementById('tr-sc').textContent=sc+' / '+items.length;if(sc>=Math.floor(items.length*.8)){markDone('translation',sc,items.length);const tidx=THEME_IDS.indexOf(currentTheme);const isLastTheme=tidx===THEME_IDS.length-1;const isLastLevel=selectedLevel==='c1';const allLevelDone=THEME_IDS.every(t=>ACT_TYPES.every(a=>levelProgress[selectedLevel][t][a]));completeBanner(c,allLevelDone?(isLastLevel?'All levels complete! 🎉':selectedLevel.toUpperCase()+' complete! 🎉'):'Theme complete! 🎉',allLevelDone&&!isLastLevel?'You have unlocked '+(selectedLevel==='b1'?'B2':'C1')+'! Return to the level selector.':allLevelDone&&isLastLevel?'Outstanding! You have completed all three levels.':'Next theme unlocked!',allLevelDone&&!isLastLevel?'Select next level →':allLevelDone&&isLastLevel?'View final report →':'← Back to themes',allLevelDone&&!isLastLevel?()=>showView('login'):allLevelDone&&isLastLevel?showFinalReport:showThemes);}};
  build();
}

// FINAL REPORT
function showFinalReport(){
  showView('final');
  document.getElementById('fr-name').textContent=userName+(userClass?' · '+userClass:'');
  document.getElementById('final-hdr').className='hdr '+lm().hdrCls;
  const cont=document.getElementById('final-content');
  let html=`<p style="font-size:1rem;font-weight:600;margin-bottom:.75rem;">Progress report — ${userName} — ${selectedLevel.toUpperCase()} level</p>`;
  let totalSc=0,totalMax=0;
  THEME_IDS.forEach(tid=>{ACT_TYPES.forEach(a=>{if(levelScores[selectedLevel][tid][a]){totalSc+=levelScores[selectedLevel][tid][a].score;totalMax+=levelScores[selectedLevel][tid][a].total;}});});
  const op=pct(totalSc,totalMax);
  const actsDone=THEME_IDS.reduce((s,tid)=>s+ACT_TYPES.filter(a=>levelProgress[selectedLevel][tid][a]).length,0);
  const themesDone=THEME_IDS.filter(tid=>ACT_TYPES.every(a=>levelProgress[selectedLevel][tid][a])).length;
  html+=`<div class="stat-grid"><div class="stat-card"><p class="stat-lbl">Overall score</p><p class="stat-val">${op}%</p><p class="stat-sub">${totalSc} / ${totalMax}</p></div><div class="stat-card"><p class="stat-lbl">Themes done</p><p class="stat-val">${themesDone} / 4</p></div><div class="stat-card"><p class="stat-lbl">Activities done</p><p class="stat-val">${actsDone} / 36</p></div><div class="stat-card"><p class="stat-lbl">Level</p><p class="stat-val"><span class="diff ${lm().diffCls}">${selectedLevel.toUpperCase()}</span></p></div></div>`;
  html+=`<p class="section-title">Breakdown by theme</p>`;
  THEME_IDS.forEach(tid=>{
    const ts=ACT_TYPES.reduce((s,a)=>s+(levelScores[selectedLevel][tid][a]?levelScores[selectedLevel][tid][a].score:0),0);
    const tm=ACT_TYPES.reduce((s,a)=>s+(levelScores[selectedLevel][tid][a]?levelScores[selectedLevel][tid][a].total:0),0);
    const tp=pct(ts,tm);
    html+=`<div class="theme-rep-block"><p style="font-size:.88rem;font-weight:600;margin-bottom:.4rem;">${DATA[tid].icon} ${DATA[tid].name} <span class="chip ${chipCls(tp)}">${tp}%</span></p>`;
    ACT_TYPES.forEach(a=>{if(levelScores[selectedLevel][tid][a]&&levelScores[selectedLevel][tid][a].total>0){const p=pct(levelScores[selectedLevel][tid][a].score,levelScores[selectedLevel][tid][a].total);html+=`<div class="act-mini-row"><span class="act-mini-name">${ACT_ICONS[a]} ${ACT_LABELS[a]}</span><div class="act-mini-bar-wrap"><div class="act-mini-bar ${lm().barCls}" style="width:${p}%"></div></div><span class="act-mini-sc">${levelScores[selectedLevel][tid][a].score}/${levelScores[selectedLevel][tid][a].total}</span><span class="chip ${chipCls(p)}" style="margin-left:4px;">${p}%</span></div>`;}});
    html+=`</div>`;
  });
  const allWrong=THEME_IDS.flatMap(tid=>levelWrong[selectedLevel][tid]);
  const wfreq={};allWrong.forEach(w=>{wfreq[w]=(wfreq[w]||0)+1;});
  const topW=Object.entries(wfreq).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if(topW.length){html+=`<p class="section-title">Most common mistakes</p>`;topW.forEach(([w])=>{html+=`<div class="improve-item">⚠ ${w}</div>`;});}
  const recs=[];
  if(op<50)recs.push('Begin with the Flashcards for each theme to consolidate core vocabulary before attempting production activities.');
  if(selectedLevel==='b1'&&op>=70)recs.push('Excellent B1 performance — you are ready to attempt the B2 level.');
  if(selectedLevel==='b2'&&op>=70)recs.push('Strong B2 results — consider progressing to C1 for advanced business English.');
  const spellingErrors=allWrong.filter(w=>w.startsWith('Spelling')||w.startsWith('Error'));
  if(spellingErrors.length>3)recs.push('Focus on spelling accuracy — particularly compound terms and words of French/Latin origin.');
  if(allWrong.filter(w=>w.startsWith('Translation')).length>4)recs.push('Review the bilingual glossary for each theme to strengthen productive translation skills.');
  if(recs.length){html+=`<p class="section-title">Recommendations</p>`;recs.forEach(r=>{html+=`<div class="rec-item">💡 ${r}</div>`;});}
  if(unlockedLevels.length>1){html+=`<p class="section-title">Progress across levels</p><div style="display:flex;gap:8px;flex-wrap:wrap;">`;['b1','b2','c1'].forEach(lvl=>{const m=LEVEL_META[lvl];const ts2=THEME_IDS.reduce((s,tid)=>s+ACT_TYPES.reduce((x,a)=>x+(levelScores[lvl][tid][a]?levelScores[lvl][tid][a].score:0),0),0);const tm2=THEME_IDS.reduce((s,tid)=>s+ACT_TYPES.reduce((x,a)=>x+(levelScores[lvl][tid][a]?levelScores[lvl][tid][a].total:0),0),0);const p2=pct(ts2,tm2);html+=`<div class="stat-card" style="min-width:100px;"><p class="stat-lbl">${lvl.toUpperCase()}</p><p class="stat-val" style="font-size:1.1rem;">${unlockedLevels.includes(lvl)?(p2>0?p2+'%':'Unlocked'):'🔒'}</p></div>`;});html+=`</div>`;}
  cont.innerHTML=html;
}
</script>
